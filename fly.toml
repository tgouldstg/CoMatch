# fly.toml app configuration file generated for comatch on 2026-03-26T09:00:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'comatch'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
